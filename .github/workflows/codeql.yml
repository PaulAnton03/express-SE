name: "CodeQL"

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript, actions]

    steps:
      - name: Start Eco CI
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: start-measurement
          send-data: false
          co2-calculation-method: constant
          co2-grid-intensity-constant: 475
        continue-on-error: true

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Eco CI checkpoint after checkout
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: checkout
        continue-on-error: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@89a39a4e59826350b863aa6b6252a07ad50cf83e
        with:
          languages: ${{ matrix.language }}
          config: |
            paths-ignore:
              - test

      - name: Eco CI checkpoint after init
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: get-measurement
          label: codeql-init
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@89a39a4e59826350b863aa6b6252a07ad50cf83e

      - name: Show Eco CI results
        uses: green-coding-solutions/eco-ci-energy-estimation@v5
        with:
          task: display-results
          display-table: true
          display-badge: false
        continue-on-error: true
